<body>
<div class="app" id="app"></div>
<script>
// ==== HTML Escaping ====
function E(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ==== IndexedDB Learner Store ====
const DB_NAME='LearnEngineDB';const DB_VER=3;
let idb=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('profile'))db.createObjectStore('profile',{keyPath:'id'});
      if(!db.objectStoreNames.contains('videos'))db.createObjectStore('videos',{keyPath:'video_id'});
      if(!db.objectStoreNames.contains('quizzes'))db.createObjectStore('quizzes',{keyPath:'id'});
      if(!db.objectStoreNames.contains('history'))db.createObjectStore('history',{keyPath:'id',autoIncrement:true});
      if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'id'});
    };
    req.onsuccess=e=>{idb=e.target.result;resolve(idb)};
    req.onerror=e=>reject(e);
  });
}

function dbGet(store,key){return new Promise((res,rej)=>{const tx=idb.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=rej})}
function dbPut(store,val){return new Promise((res,rej)=>{const tx=idb.transaction(store,'readwrite');const r=tx.objectStore(store).put(val);r.onsuccess=()=>res(r.result);r.onerror=rej})}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=idb.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=rej})}

async function getProfile(){
  let p=await dbGet('profile','main');
  if(!p)p={id:'main',totalQuizzes:0,totalQuestions:0,accuracy:0,topics:{},concepts:{},weakAreas:[],strongAreas:[],learningStyle:{}};
  return p;
}

async function getApiKey(){
  const s=await dbGet('settings','apikey');
  return s?.value||'';
}
async function saveApiKey(key){
  await dbPut('settings',{id:'apikey',value:key.trim()});
}
async function getModel(){
  const s=await dbGet('settings','model');
  return s?.value||'anthropic/claude-sonnet-4';
}
async function saveModel(model){
  await dbPut('settings',{id:'model',value:model.trim()});
}

// ==== SM-2 Algorithm ====
function sm2Update(concept,quality){
  if(!concept.easiness){concept.easiness=2.5;concept.interval=1;concept.reps=0}
  if(quality>=3){
    if(concept.reps===0)concept.interval=1;
    else if(concept.reps===1)concept.interval=6;
    else concept.interval=Math.round(concept.interval*concept.easiness);
    concept.reps++;
  }else{concept.reps=0;concept.interval=1}
  concept.easiness=Math.max(1.3,concept.easiness+0.1-(5-quality)*(0.08+(5-quality)*0.02));
  concept.lastReview=new Date().toISOString();
  concept.nextReview=new Date(Date.now()+concept.interval*86400000).toISOString();
  concept.tested=(concept.tested||0)+1;
  concept.correct=(concept.correct||0)+(quality>=3?1:0);
  concept.mastery=concept.correct/concept.tested;
  return concept;
}

function getDueConcepts(profile){
  const now=new Date();const due=[];
  for(const[id,c]of Object.entries(profile.concepts||{})){
    if(!c.nextReview||new Date(c.nextReview)<=now)due.push({id,...c});
  }
  due.sort((a,b)=>(a.nextReview||'2000')>(b.nextReview||'2000')?1:-1);
  return due;
}

async function recordResult(quizId,answers,questions){
  const profile=await getProfile();
  let correct=0;const details=[];const wrong=[];
  questions.forEach((q,i)=>{
    const sel=answers[i];
    const rightOpt=q.options.find(o=>o.correct);
    const isCorrect=sel===rightOpt?.label;
    if(isCorrect)correct++;
    else wrong.push({question:q.question,selected:sel,selectedText:(q.options.find(o=>o.label===sel)||{}).text||'',correct:rightOpt?.label,correctText:rightOpt?.text,whyWrong:(q.options.find(o=>o.label===sel)||{}).why_wrong||'',concept_id:q.concept_id,concept_name:q.concept_name,topic:q.topic});
    const selOpt=q.options.find(o=>o.label===sel);
    details.push({question:q.question,correct:isCorrect,selected:sel,correctAnswer:rightOpt?.label,correctText:rightOpt?.text,whyWrong:(!isCorrect&&selOpt)?selOpt.why_wrong||'':'',explanation:q.explanation||'',deeperInsight:q.deeper_insight||'',misconception:q.common_misconception||'',concept_id:q.concept_id,concept_name:q.concept_name||'',topic:q.topic||'',bloom:q.bloom_level||''});
    const cid=q.concept_id||q.question.slice(0,50);
    const quality=isCorrect?4:1;
    if(!profile.concepts[cid])profile.concepts[cid]={topic:q.topic||'general',name:q.concept_name||cid,description:q.question.slice(0,200)};
    profile.concepts[cid]=sm2Update(profile.concepts[cid],quality);
  });

  const total=questions.length;const score=total>0?correct/total:0;
  profile.totalQuizzes++;profile.totalQuestions+=total;
  const oldTotal=profile.totalQuestions-total;
  const oldCorrect=Math.round(profile.accuracy*oldTotal);
  profile.accuracy=profile.totalQuestions>0?(oldCorrect+correct)/profile.totalQuestions:0;

  const topicScores={};
  details.forEach(d=>{const t=d.topic||'general';if(!topicScores[t])topicScores[t]={c:0,t:0};topicScores[t].t++;if(d.correct)topicScores[t].c++});
  for(const[topic,s]of Object.entries(topicScores)){
    if(!profile.topics[topic])profile.topics[topic]={strength:.5,count:0};
    const t=profile.topics[topic];
    t.strength=.7*t.strength+.3*(s.c/s.t);t.count+=s.t;t.lastSeen=new Date().toISOString();
  }
  profile.weakAreas=Object.entries(profile.topics).filter(([,d])=>d.strength<.6&&d.count>=2).map(([t])=>t);
  profile.strongAreas=Object.entries(profile.topics).filter(([,d])=>d.strength>=.85&&d.count>=2).map(([t])=>t);

  const wrongTopics=details.filter(d=>!d.correct).map(d=>d.topic);
  const ls=profile.learningStyle||{};
  ls.recentStruggles=wrongTopics;
  const acc=score;
  if(total>=3){ls.teachingMode=acc<.4?'foundational':acc<.7?'scaffolded':'challenging'}
  profile.learningStyle=ls;

  await dbPut('profile',profile);
  await dbPut('history',{id:Date.now(),quizId,timestamp:new Date().toISOString(),score,total,correct});

  return{score:Math.round(score*100*10)/10,correct,total,details,wrongAnswers:wrong,weakAreas:profile.weakAreas,strongAreas:profile.strongAreas,needsFollowup:score<.8,learningStyle:profile.learningStyle,dueForReview:getDueConcepts(profile).length};
}

// ==== YouTube Transcript (client-side) ====
function extractVideoId(url){
  const patterns=[/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,/(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,/^([a-zA-Z0-9_-]{11})$/];
  for(const p of patterns){const m=url.match(p);if(m)return m[1]}
  throw new Error('Could not find a YouTube video ID in that URL');
}

async function fetchTranscript(videoId){
  // Method 0: Try local transcript proxy (runs on your Mac via transcript_proxy.py)
  try{
    const r=await fetch(`http://localhost:8219/transcript?v=${videoId}`,{signal:AbortSignal.timeout(5000)});
    if(r.ok){const j=await r.json();if(j.full_text)return j.full_text}
  }catch(e){/* local proxy not running, try other methods */}

  // Method 1: Use YouTube's innertube API via CORS proxy to get player response
  const proxies=['https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];

  // Try fetching the embed page (lighter, less bot detection)
  const urls=[
    'https://www.youtube.com/watch?v='+videoId,
    'https://www.youtube.com/embed/'+videoId,
    'https://m.youtube.com/watch?v='+videoId
  ];

  let html=null;
  for(const proxy of proxies){
    for(const pageUrl of urls){
      try{
        const r=await fetch(proxy+encodeURIComponent(pageUrl),{signal:AbortSignal.timeout(15000)});
        if(r.ok){
          const text=await r.text();
          // Check if we got actual video page (not consent/error)
          if(text.includes('captionTracks')||text.includes('captions')){html=text;break}
        }
      }catch(e){continue}
    }
    if(html)break;
  }

  if(html){
    // Try multiple regex patterns to extract caption tracks
    let tracks=null;
    const patterns=[
      /"captionTracks"\s*:\s*(\[.*?\])\s*[,}]/,
      /captionTracks.*?(\[.*?"baseUrl".*?\])/s,
      /"playerCaptionsTracklistRenderer".*?"captionTracks"\s*:\s*(\[[\s\S]*?\])\s*,/
    ];
    for(const pat of patterns){
      const m=html.match(pat);
      if(m){try{tracks=JSON.parse(m[1]);break}catch(e){}}
    }

    if(tracks&&tracks.length){
      const enTrack=tracks.find(t=>t.languageCode==='en')||tracks.find(t=>t.languageCode?.startsWith('en'))||tracks[0];
      if(enTrack?.baseUrl){
        // Fetch caption XML
        for(const proxy of proxies){
          try{
            const r=await fetch(proxy+encodeURIComponent(enTrack.baseUrl),{signal:AbortSignal.timeout(15000)});
            if(r.ok){
              const captionXml=await r.text();
              const parser=new DOMParser();
              const doc=parser.parseFromString(captionXml,'text/xml');
              const texts=[...doc.querySelectorAll('text')].map(t=>{
                let s=t.textContent||'';
                s=s.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\n/g,' ');
                return s.trim();
              }).filter(Boolean);
              if(texts.length)return texts.join(' ');
            }
          }catch(e){continue}
        }
      }
    }
  }

  // Method 2: Try YouTube's timedtext API directly
  const ttUrls=[
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en&fmt=json3`,
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en`,
  ];
  for(const proxy of proxies){
    for(const ttUrl of ttUrls){
      try{
        const r=await fetch(proxy+encodeURIComponent(ttUrl),{signal:AbortSignal.timeout(10000)});
        if(r.ok){
          const text=await r.text();
          if(text.includes('"segs"')||text.includes('<text')){
            // JSON format
            try{
              const j=JSON.parse(text);
              const segs=[];
              (j.events||[]).forEach(ev=>{(ev.segs||[]).forEach(s=>{if(s.utf8&&s.utf8.trim())segs.push(s.utf8.trim())})});
              if(segs.length)return segs.join(' ');
            }catch(e){}
            // XML format
            const parser=new DOMParser();
            const doc=parser.parseFromString(text,'text/xml');
            const texts=[...doc.querySelectorAll('text')].map(t=>t.textContent?.trim()).filter(Boolean);
            if(texts.length)return texts.join(' ');
          }
        }
      }catch(e){continue}
    }
  }

  // Method 3: Try third-party transcript services
  const thirdParty=[
    `https://yt.lemnoslife.com/noKey/videos?part=transcript&id=${videoId}`,
  ];
  for(const url of thirdParty){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
      if(r.ok){
        const j=await r.json();
        const items=j?.items?.[0]?.transcript?.content;
        if(items?.length){
          return items.map(i=>i.text||'').filter(Boolean).join(' ');
        }
      }
    }catch(e){continue}
  }

  throw new Error('Could not fetch transcript automatically. Open the "Paste transcript manually" section below, go to the YouTube video, click "..." > "Show transcript", copy the text, and paste it here.');
}

// ==== OpenRouter LLM (direct from browser) ====
async function callLLM(prompt,maxTokens=12000){
  const apiKey=await getApiKey();
  if(!apiKey)throw new Error('No API key set. Tap the gear icon to add your OpenRouter key.');
  const model=await getModel();
  const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey,'HTTP-Referer':location.href,'X-Title':'LearnEngine'},
    body:JSON.stringify({model,max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    const msg=err?.error?.message||err?.error||'API error '+res.status;
    throw new Error(typeof msg==='string'?msg:JSON.stringify(msg));
  }
  const data=await res.json();
  return data.choices[0].message.content.trim();
}

function parseJSON(text){
  text=text.trim();
  if(text.startsWith('```')){text=text.split('\n',1).length>1?text.slice(text.indexOf('\n')+1):text.slice(3)}
  if(text.endsWith('```'))text=text.slice(0,-3).trimEnd();
  try{return JSON.parse(text)}catch(e){}
  const m=text.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(e){}}
  throw new Error('Could not parse AI response as JSON. Try again.');
}

// ==== Prompts ====
function analyzePrompt(title,transcript,learnerCtx){
  let learnerSection='';
  if(learnerCtx){
    const mode=learnerCtx.learning_style?.teachingMode||'scaffolded';
    const weak=learnerCtx.weak_areas||[];
    const acc=learnerCtx.overall_accuracy||50;
    learnerSection=`\nLEARNER PROFILE:\n- Accuracy: ${acc}%, Mode: ${mode}, Weak: ${weak.length?weak.join(', '):'None'}\n- If foundational: simpler language, analogies. If scaffolded: sequential questions. If challenging: synthesis questions.`;
  }
  return `You are an expert educational content designer. Analyze this transcript for DEEP UNDERSTANDING.

VIDEO TITLE: ${title}
${learnerSection}
TRANSCRIPT:
${transcript.slice(0,80000)}

Respond with JSON only (no markdown fencing):

{
  "summary": "3-5 sentence summary",
  "key_concepts": [
    {"id": "concept_1", "name": "Short name", "explanation": "Clear explanation", "simple_analogy": "Everyday analogy", "topic": "Category", "importance": "high/medium/low"}
  ],
  "fact_check": [
    {"claim": "Specific claim", "assessment": "accurate/partially_accurate/inaccurate/unverifiable", "correction": "If inaccurate, null if accurate.", "reasoning": "Why"}
  ],
  "misinformation_flags": [
    {"statement": "...", "issue": "...", "severity": "high/medium/low"}
  ],
  "bias_notes": "Notable biases or missing context",
  "difficulty_level": "beginner/intermediate/advanced",
  "learning_objectives": ["By the end you should be able to..."],
  "quiz": [
    {
      "question": "Clear question testing understanding",
      "concept_id": "which concept", "concept_name": "readable name", "topic": "topic area",
      "difficulty": "easy/medium/hard", "bloom_level": "remember/understand/apply/analyze/evaluate",
      "options": [
        {"label": "A", "text": "...", "correct": false, "why_wrong": "..."},
        {"label": "B", "text": "...", "correct": true, "why_wrong": null},
        {"label": "C", "text": "...", "correct": false, "why_wrong": "..."},
        {"label": "D", "text": "...", "correct": false, "why_wrong": "..."}
      ],
      "explanation": "Why correct answer is correct",
      "common_misconception": "Most common mistake",
      "deeper_insight": "Beyond the video",
      "hint": "Nudge without revealing"
    }
  ]
}

RULES:
- 10-15 questions covering ALL key concepts
- Bloom's: 20% remember, 30% understand, 25% apply, 15% analyze, 10% evaluate
- Wrong options = REAL misconceptions, not obviously wrong
- Fact-check ALL claims, dates, statistics
- Every hint guides thinking, doesn't reveal answer
- CRITICAL: Every correct answer MUST be verifiable directly from the transcript. Do NOT generate questions whose correct answer relies on information not present in the transcript.
- Double-check that exactly ONE option per question has "correct": true
- why_wrong for each incorrect option must clearly explain WHY it is wrong, referencing the transcript
- explanation field must be a thorough 2-3 sentence teaching moment, not just "This is correct because..."
- If the transcript contains errors or debatable claims, note this in fact_check and avoid testing those claims as if they are settled facts`;
}

function followupPrompt(wrongAnswers,weakConcepts,transcript,learnerCtx){
  let styleCtx='';
  if(learnerCtx){
    const mode=learnerCtx.learning_style?.teachingMode||'scaffolded';
    styleCtx=`\nLEARNER MODE: ${mode}`;
  }
  return `You are an adaptive tutor. A learner struggled. TEACH through questions, don't just retest.

STRUGGLED WITH: ${JSON.stringify(weakConcepts)}
WRONG ANSWERS: ${JSON.stringify(wrongAnswers)}
${styleCtx}
TRANSCRIPT: ${transcript.slice(0,40000)}

Generate 6-10 TEACHING questions. JSON only:
{
  "diagnosis": "Misconception pattern detected",
  "teaching_strategy": "How this fixes the misunderstanding",
  "focus_areas": ["concepts retested"],
  "quiz": [
    {
      "question": "...", "concept_id": "...", "concept_name": "...", "topic": "...",
      "difficulty": "easy/medium/hard", "bloom_level": "remember/understand/apply/analyze",
      "scaffold_note": "How this builds understanding",
      "teaching_moment": "Key insight",
      "options": [
        {"label": "A", "text": "...", "correct": false, "why_wrong": "..."},
        {"label": "B", "text": "...", "correct": true, "why_wrong": null},
        {"label": "C", "text": "...", "correct": false, "why_wrong": "..."},
        {"label": "D", "text": "...", "correct": false, "why_wrong": "..."}
      ],

      "hint": "Thinking prompt"
    }
  ]
}
Sequence: Q1-2 prerequisites (easy), Q3-5 build (medium), Q6-8 apply (hard), Q9-10 synthesize`;
}

let S={view:'dashboard',videos:[],quizzes:[],currentQuiz:null,answers:{},results:null,processing:false,hints:{},profile:null,dueCount:0,hasKey:false};

// ==== Init ====
async function init(){
  await openDB();
  S.profile=await getProfile();
  S.videos=await dbGetAll('videos');
  S.quizzes=await dbGetAll('quizzes');
  S.dueCount=getDueConcepts(S.profile).length;
  S.hasKey=!!(await getApiKey());
  render();
}

// ==== Render ====
function render(){
  document.getElementById('app').innerHTML=renderHeader()+(
    S.view==='dashboard'?renderDashboard():
    S.view==='process'?renderProcess():
    S.view==='quiz'?renderQuiz():
    S.view==='results'?renderResults():
    S.view==='history'?renderHistory():
    S.view==='settings'?renderSettings():''
  );
}

function renderHeader(){
  return`<div class="header"><h1><span>Learn</span>Engine</h1><div class="nav">
    <button class="${S.view==='dashboard'?'active':''}" onclick="nav('dashboard')">Dashboard</button>
    <button class="${S.view==='process'?'active':''}" onclick="nav('process')">+ New Video</button>
    <button class="${S.view==='history'?'active':''}" onclick="nav('history')">History</button>
    ${S.dueCount>0?`<button class="review-btn" onclick="startReview()">Review (${S.dueCount})</button>`:''}
    <button class="settings-btn ${S.view==='settings'?'active':''}" onclick="nav('settings')"><span class="key-status ${S.hasKey?'key-ok':'key-missing'}"></span>Settings</button></div></div>`;
}

function renderDashboard(){
  const p=S.profile||{};const acc=Math.round((p.accuracy||0)*100*10)/10;
  const concepts=Object.values(p.concepts||{});
  const mastered=concepts.filter(c=>(c.mastery||0)>=.85).length;
  const learning=concepts.filter(c=>(c.mastery||0)>=.5&&(c.mastery||0)<.85).length;
  const struggling=concepts.filter(c=>(c.mastery||0)<.5).length;
  const total=mastered+learning+struggling;
  const mp=total?mastered/total*100:0,lp=total?learning/total*100:0,sp=total?struggling/total*100:0;

  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="value">${S.videos.length}</div><div class="label">Videos</div></div>
    <div class="stat-card"><div class="value">${p.totalQuizzes||0}</div><div class="label">Quizzes</div></div>
    <div class="stat-card"><div class="value">${acc}%</div><div class="label">Accuracy</div></div>
    <div class="stat-card"><div class="value" style="color:${S.dueCount?'var(--orange)':'var(--green)'}">${S.dueCount}</div><div class="label">Due Review</div></div>

  if(total>0)html+=`<div class="card"><h2>Concept Mastery</h2>
    <div class="mastery-bar"><div class="seg seg-mastered" style="width:${mp}%"></div><div class="seg seg-learning" style="width:${lp}%"></div><div class="seg seg-struggling" style="width:${sp}%"></div></div>
    <div style="display:flex;gap:16px;font-size:12px;color:var(--text-muted)"><span style="color:var(--green)">Mastered: ${mastered}</span><span style="color:var(--yellow)">Learning: ${learning}</span><span style="color:var(--red)">Struggling: ${struggling}</span></div></div>`;

  if(S.dueCount>0)html+=`<div class="card" style="border-color:var(--orange)"><h2>Review Time</h2>
    <p style="color:var(--text-muted);margin-bottom:12px">${S.dueCount} concept${S.dueCount>1?'s':''} due for spaced repetition review.</p>
    <button class="btn btn-orange" onclick="startReview()">Start Review</button></div>`;

    <p style="color:var(--text-muted);margin-bottom:12px">Add your OpenRouter API key in Settings to enable AI-powered quizzes.</p>
    <button class="btn btn-primary btn-sm" onclick="nav('settings')">Open Settings</button></div>`;

    <div class="video-item"><div><div style="font-weight:500">${E(v.title||v.video_id)}</div>
    <div style="font-size:12px;color:var(--text-muted)">${v.processed_at?new Date(v.processed_at).toLocaleDateString():''}</div></div>
    <button class="btn btn-secondary btn-sm" onclick="loadQuiz('${E(v.video_id)}')">Quiz</button></div>`).join('')}</div>`;

// ==== Actions ====
function nav(v){S.view=v;S.hints={};if(v==='dashboard')init();else render();if(v==='settings')loadSettingsValues()}
function pick(i,label){S.answers[i]=label;render()}

async function loadSettingsValues(){
  setTimeout(async()=>{
    const key=await getApiKey();const model=await getModel();
    const ki=document.getElementById('apiKeyInput');if(ki&&key)ki.value=key;
    const mi=document.getElementById('modelInput');if(mi)mi.value=model;
  },50);
}

async function saveSettings(){
  const key=document.getElementById('apiKeyInput')?.value||'';
  const model=document.getElementById('modelInput')?.value||'anthropic/claude-sonnet-4';
  await saveApiKey(key);await saveModel(model);
  S.hasKey=!!key.trim();
  const el=document.getElementById('settingsSaved');if(el){el.textContent='Saved!';setTimeout(()=>{if(el)el.textContent=''},2000)}
  render();loadSettingsValues();
}

async function resetAllData(){
  const stores=['profile','videos','quizzes','history'];
  for(const s of stores){
    await new Promise((res,rej)=>{const tx=idb.transaction(s,'readwrite');tx.objectStore(s).clear();tx.oncomplete=res;tx.onerror=rej});
  }
  S={view:'dashboard',videos:[],quizzes:[],currentQuiz:null,answers:{},results:null,processing:false,hints:{},profile:null,dueCount:0,hasKey:S.hasKey};
  await init();
}

function setStatus(msg){const el=document.getElementById('processStatus');if(el)el.textContent=msg}
function setError(msg){const el=document.getElementById('processErr');if(el)el.textContent=msg}

async function processVideo(){
  const url=document.getElementById('vidUrl')?.value?.trim();
  const title=document.getElementById('vidTitle')?.value?.trim();
  const manual=document.getElementById('manualTx')?.value?.trim();
  if(!url&&!manual){setError('Enter a YouTube URL or paste a transcript');return}

  S.processing=true;render();

  try{
    let transcript,videoId;
    if(manual){
      transcript=manual;videoId=url?extractVideoId(url):'manual';
      setStatus('Using pasted transcript...');
    }else{
      videoId=extractVideoId(url);
      setStatus('Fetching transcript from YouTube...');
      try{
        transcript=await fetchTranscript(videoId);
        setStatus('Transcript fetched! Analyzing with AI...');
      }catch(e){
        S.processing=false;render();
        setError(e.message);
        return;
      }
    }

    if(!transcript||transcript.length<50){S.processing=false;render();setError('Transcript too short (need at least 50 characters)');return}

    setStatus('Analyzing with AI... this takes 30-60 seconds');

    const profile=await getProfile();
    const learnerCtx={
      learning_style:profile.learningStyle||{},
      weak_areas:profile.weakAreas||[],
      strong_areas:profile.strongAreas||[],
      overall_accuracy:Math.round((profile.accuracy||.5)*100),
    };

    const text=await callLLM(analyzePrompt(title||'Video',transcript,learnerCtx),12000);
    const analysis=parseJSON(text);

    const videoData={video_id:videoId,url:url||'manual',title:title||'Video '+videoId,transcript:{full_text:transcript.slice(0,50000),word_count:transcript.split(/\s+/).length},analysis,processed_at:new Date().toISOString()};
    await dbPut('videos',videoData);

    if(analysis.quiz?.length){
      const quiz={id:Date.now().toString(36),video_id:videoId,video_title:title||'Video '+videoId,quiz_type:'initial',questions:analysis.quiz,created_at:new Date().toISOString()};
      await dbPut('quizzes',quiz);
      S.currentQuiz=quiz;S.answers={};S.hints={};
      S.videos=await dbGetAll('videos');S.quizzes=await dbGetAll('quizzes');
      S.processing=false;S.view='quiz';render();
    }else{
      S.processing=false;render();
      setError('Analysis completed but no quiz was generated. Try again.');
    }
  }catch(e){
    S.processing=false;render();
    setError(e.message);
  }
}

async function submitQuiz(){
  const q=S.currentQuiz;if(!q)return;
  S.results=await recordResult(q.id,S.answers,q.questions);
  S.profile=await getProfile();S.dueCount=getDueConcepts(S.profile).length;
  S.view='results';render();window.scrollTo(0,0);
}

async function requestFollowup(){
  const q=S.currentQuiz;const r=S.results;if(!q||!r)return;
  S.processing=true;S.view='dashboard';render();
  try{
    const profile=await getProfile();
    const video=await dbGet('videos',q.video_id);
    const text=await callLLM(followupPrompt(
      r.wrongAnswers,
      r.wrongAnswers.map(w=>w.concept_id),
      video?.transcript?.full_text||'',
      {learning_style:profile.learningStyle||{},weak_areas:profile.weakAreas||[],overall_accuracy:Math.round((profile.accuracy||.5)*100)}
    ),10000);
    const result=parseJSON(text);
    const followup={id:Date.now().toString(36),video_id:q.video_id,video_title:q.video_title,quiz_type:'followup',questions:result.quiz||[],focus_areas:result.focus_areas||[],diagnosis:result.diagnosis||'',teaching_strategy:result.teaching_strategy||'',created_at:new Date().toISOString()};
    await dbPut('quizzes',followup);
    S.quizzes=await dbGetAll('quizzes');
    S.currentQuiz=followup;S.answers={};S.hints={};S.processing=false;S.view='quiz';render();window.scrollTo(0,0);
  }catch(e){S.processing=false;render();alert('Follow-up error: '+e.message)}
}

async function startReview(){
  S.processing=true;S.view='dashboard';render();
  try{
    const profile=await getProfile();
    const due=getDueConcepts(profile).slice(0,15).map(c=>({id:c.id,name:c.name,topic:c.topic,mastery:c.mastery,tested:c.tested}));
    if(!due.length){S.processing=false;render();alert('No concepts due for review');return}
    const text=await callLLM(reviewPrompt(due),8000);
    const result=parseJSON(text);
    if(result.message){alert(result.message);S.processing=false;render();return}
    const review={id:Date.now().toString(36),video_id:'review',video_title:'Spaced Review',quiz_type:'review',questions:result.quiz||[],focus_areas:result.focus_areas||[],created_at:new Date().toISOString()};
    await dbPut('quizzes',review);
    S.quizzes=await dbGetAll('quizzes');
    S.currentQuiz=review;S.answers={};S.hints={};S.processing=false;S.view='quiz';render();window.scrollTo(0,0);
  }catch(e){S.processing=false;render();alert('Review error: '+e.message)}
}

function loadQuiz(videoId){
  const q=S.quizzes.find(q=>q.video_id===videoId&&q.quiz_type!=='followup'&&q.quiz_type!=='review');
  if(q){S.currentQuiz=q;S.answers={};S.hints={};S.view='quiz';render();window.scrollTo(0,0)}
}
function startQuizById(id){
  const q=S.quizzes.find(q=>q.id===id);
  if(q){S.currentQuiz=q;S.answers={};S.hints={};S.view='quiz';render();window.scrollTo(0,0)}
}

// Boot
init();
</script>
